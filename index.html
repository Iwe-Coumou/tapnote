<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tapnote</title>
</head>
<body>

  <p id="message"></p>

  <script>
    // Your messages go here.
    const messages = [
      "First message.",
      "Second message.",
      "Third message."
    ];

    // Pick one at random and put it on the page.
    function showRandom() {
      const pick = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("message").textContent = pick;
    }

    showRandom();
  </script>

</body>
</html>
